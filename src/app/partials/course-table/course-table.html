<section>
    <table>
        <thead>
            <tr>
                <th>Kurskod</th>
                <th>Kursnamn</th>
                <th>Poäng</th>
                <th>Ämne</th>
                <th>Kursplan</th>
                <th>Lägg till</th>
            </tr>
        </thead>
        <tbody>
            @for (course of courses; track course.courseCode) {
                <tr>
                    <td>{{course.courseCode}}</td>
                    <td>{{course.courseName}}</td>
                    <td>{{course.points}}</td>
                    <td>{{course.subjectCode}}</td>
                    <td><a [href]="course.syllabus">Kursplan</a></td>
                    <td><button class="btn" [id]="course.courseCode">Lägg till</button></td>
                </tr>
            }
        </tbody>
    </table>       
</section>
